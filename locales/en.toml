step1_title = "The Dungeon"
step1_desc = "Welcome, Scoundrel! You are trapped in a deck of cards. Your goal is to survive until the deck is empty."
step2_title = "Health (Hearts)"
step2_desc = "Hearts restore your HP (Max 20). Be careful: if a room has 3 or more Hearts, you MUST run away immediately!"
step3_title = "Weapons (Diamonds)"
step3_desc = "Diamonds are weapons. They reduce damage from monsters. A weapon 'remembers' the last monster it killed—it can only kill monsters of equal or lower value next!"
step4_title = "Monsters (Clubs & Spades)"
step4_desc = "Monsters deal damage equal to their value. If you have a weapon, subtract its value from the monster's value. Barehanded kills cost full HP!"
step5_title = "The Room"
step5_desc = "Each room has 4 cards. You must play exactly 3 cards to move to the next room. You can 'Run Away' once to reshuffle, but only if you haven't played any cards yet!"

